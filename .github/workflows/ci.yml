name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
    
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: |
        pytest
  
  build-docker:
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE: ghcr.io/${{ github.repository }}:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build app image
      uses: docker/build-push-action@v5
      with:
        context: docker
        push: false
        tags: ${{ env.IMAGE }}
    
    - name: Build Caddy image (check)
      shell: bash
      run: |
        set -euo pipefail

        image_digest() {
          docker image inspect --format='{{index .RepoDigests 0}}' "$1" 2>/dev/null | awk -F@ '{print $2}' || true
        }

        pull_with_digest_report() {
          local image="$1"
          local before_digest
          before_digest=$(image_digest "$image")
          if [ -z "$before_digest" ]; then
            before_digest="<missing>"
          fi

          docker pull "$image"

          local after_digest
          after_digest=$(image_digest "$image")
          if [ -z "$after_digest" ]; then
            echo "::error::Unable to resolve digest for $image after pull"
            exit 1
          fi

          echo "IMAGE_PULL_IMAGE=$image"
          echo "IMAGE_DIGEST_BEFORE=$before_digest"
          echo "IMAGE_DIGEST_AFTER=$after_digest"
          if [ "$before_digest" != "$after_digest" ]; then
            echo "NEW_IMAGE_DOWNLOADED=yes"
          else
            echo "NEW_IMAGE_DOWNLOADED=no"
          fi
        }

        pull_with_digest_report caddy:2-alpine
